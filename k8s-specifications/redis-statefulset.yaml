apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  labels:
    app: redis

spec:
  serviceName: redis-service
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis
          image: redis:7-alpine

          ports:
            - name: redis
              containerPort: 6379

          args:
            - redis-server
            - --appendonly
            - "yes"

          volumeMounts:
            - name: redis-data
              mountPath: /data

  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        storageClassName: kops-csi-1-21
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
